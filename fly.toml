# fly.toml app configuration file generated for prjna-ai on 2026-05-01T12:13:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prjna-ai'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
